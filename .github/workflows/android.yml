name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Environment Variables
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug Keystore restored from Base64"
        else
          echo "No debug.keystore.base64 found, Gradle will generate a default one"
        fi

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: distro-book-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
