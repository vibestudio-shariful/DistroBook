name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # GitHub UI থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Environment Variables
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug Keystore restored from Base64"
        else
          echo "No debug.keystore.base64 found, generating a default one..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storetype PKCS12
        fi

    # অফিশিয়াল গিটহাব অ্যাকশন যা করাপ্ট জার ফাইল বাইপাস করে রানারে অটোমেটিক সঠিক Gradle এনভায়রনমেন্ট তৈরি করবে
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper # আপনার প্রোজেক্টের gradle-wrapper.properties ফাইলে যে ভার্সন আছে সেটাই অটোমেটিক রিড করবে

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug -Pkotlin.compiler.execution.strategy=daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: distro-book-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
