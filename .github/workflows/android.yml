name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # GitHub UI থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle # এর ফলে পরবর্তী বিল্ডগুলো অনেক দ্রুত হবে

    - name: Set up Environment Variables
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug Keystore restored from Base64"
        else
          echo "No debug.keystore.base64 found, generating a default one..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storetype PKCS12
        fi

    # এই নতুন স্টেপটি আপনার করাপ্ট হওয়া gradle-wrapper.jar ফাইলটিকে অটোমেটিক ডাউনলোড করে ফিক্স করবে
    - name: Download Fresh Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug -Pkotlin.compiler.execution.strategy=daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: distro-book-debug-apk
        # এখানে ওয়াইল্ডকার্ড (*) ব্যবহার করায় APK এর নাম সামান্য পরিবর্তন হলেও বিল্ড ফেইল হবে না
        path: "**/build/outputs/apk/debug/*.apk"
        if-no-files-found: error
