name: Android Signed APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড ক্লোন করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা (Gradle 9+ এর জন্য JDK 21 বাধ্যতামূলক)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ৩. গ্রেডল সেটআপ করা এবং র‍্যাপার ভ্যালিডেশন বন্ধ করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false # এখানে Wrapper Validation পুরোপুরি বন্ধ করে দেওয়া হলো

      # ৪. গ্রেডল দিয়ে আনসাইনড রিলিজ এপিকে তৈরি করা
      - name: Build Unsigned Release APK
        run: gradle assembleRelease

      # ৫. আপনার সিক্রেট থেকে Base64 কোড নিয়ে আসল কিস্টোর (.jks) ফাইলটি তৈরি করা
      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/my-release-key.jks

      # ৬. তৈরি হওয়া Keystore ফাইল এবং পাসওয়ার্ড দিয়ে APK সম্পূর্ণ সাইন করা
      - name: Sign Release APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          $BUILD_TOOLS_DIR/apksigner sign --ks app/my-release-key.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      # ৭. সফলভাবে সাইন হওয়া এপিকে-টি গিটহাব অ্যাকশনের 'Artifact' হিসেবে আপলোড করা
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
