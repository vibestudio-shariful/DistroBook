name: Android Signed APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড ক্লোন করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ৩. গ্রেডল সেটআপ করা এবং র‍্যাপার ভ্যালিডেশন বন্ধ করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # ৪. Secrets থেকে কিস্টোর ফাইলটি তৈরি করা
      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      # ৫. গ্রেডলের পাসওয়ার্ডের ঝামেলা এড়াতে local.properties ফাইলে সিক্রেটগুলো পুশ করা
      # (অ্যান্ড্রয়েড বিল্ড সিস্টেম সাধারণত এই ভেরিয়েবল নামগুলোই ডিফল্ট হিসেবে খোঁজে)
      - name: Inject Signing Config into local.properties
        run: |
          echo "signing.storeFile=../my-upload-key.jks" >> local.properties
          echo "signing.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          
          # কিছু প্রজেক্ট সরাসরি এই ফরম্যাটও খুঁজতে পারে, তাই ব্যাকআপ হিসেবে এটাও যোগ করা হলো:
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

      # ৬. গ্রেডল দিয়ে রিলিজ এপিকে তৈরি করা (এখন গ্রেডল local.properties থেকে storePassword পেয়ে যাবে)
      - name: Build Signed Release APK
        run: gradle assembleRelease

      # ৭. ফাইনাল চেক এবং আউটপুট ফাইল রেডি করা
      - name: Prepare Signed APK Artifact
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-signed.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
            $BUILD_TOOLS_DIR/apksigner sign --ks my-upload-key.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out app/build/outputs/apk/release/app-release-signed.apk \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      # ৮. সফলভাবে সাইন হওয়া এপিকে-টি গিটহাব অ্যাকশনের 'Artifact' হিসেবে আপলোড করা
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
