name: Android Signed APK Builder new

on:
  push:
    branches:
      - main  # অথবা আপনার মেইন ব্রাঞ্চের নাম (যেমন: master)
  workflow_dispatch: # যার মাধ্যমে আপনি যেকোনো সময় ম্যানুয়ালি বিল্ড রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড ক্লোন করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা (Java 17 অ্যান্ড্রয়েড বিল্ডের জন্য স্ট্যান্ডার্ড)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ৩. আপনার সিক্রেট থেকে Base64 কোড নিয়ে আসল কিস্টোর (.jks) ফাইলটি তৈরি করা (গ্রেডল রান করার আগেই তৈরি করতে হবে)
      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r \n' | base64 --decode > my-upload-key.jks

      # ৪. গ্রেডল সেটআপ করা (যাতে লোকাল র্যাপার বা উইন্ডোজ CRLF লাইনের কোনো সমস্যা ছাড়াই ৯.৩.১ ভার্সনে বিল্ড হতে পারে এবং র্যাপার ভ্যালিডেশন বন্ধ রাখা হয়েছে)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # ৫. গ্রেডল দিয়ে সরাসরি সাইন্ড রিলিজ এপিকে তৈরি করা (র্যাপার ছাড়াই সরাসরি গ্লোবাল গ্রেডল দিয়ে এবং সিক্রেট এনভায়রনমেন্ট ভেরিয়েবল সহ)
      - name: Build and Sign Release APK
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        run: gradle assembleRelease

      # ৬. সফলভাবে সাইন হওয়া এপিকে-টি গিটহাব অ্যাকশনের 'Artifact' হিসেবে আপলোড করা
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release.apk

