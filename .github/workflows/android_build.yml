name: Android Signed APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড ক্লোন করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ৩. গ্রেডল সেটআপ করা এবং র‍্যাপার ভ্যালিডেশন বন্ধ করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # ৪. গ্রেডল বিল্ড শুরু হওয়ার আগেই আপনার Secrets থেকে কিস্টোর ফাইলটি তৈরি করা
      # এরর অনুযায়ী গ্রেডল 'my-upload-key.jks' ফাইলটি রুট ডিরেক্টরিতে খুঁজছে, তাই আমরা সেখানেই তৈরি করছি
      - name: Decode Keystore File Before Build
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      # ৫. গ্রেডল দিয়ে রিলিজ এপিকে তৈরি করা (এখন গ্রেডল তার কাঙ্ক্ষিত কিস্টোর ফাইলটি পেয়ে যাবে)
      - name: Build Signed Release APK
        run: gradle assembleRelease
        env:
          # আপনার প্রজেক্টের build.gradle যদি এনভায়রনমেন্ট ভেরিয়েবল খোঁজে, তার জন্য ব্যাকআপ সেটিংস
          MY_APP_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MY_APP_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MY_APP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ৬. ভেরিফিকেশনের জন্য apksigner দিয়ে ফাইনাল চেক বা রি-সাইন করা (যদি প্রয়োজন হয়)
      - name: Verify or Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # যদি গ্রেডল অলরেডি সাইনড এপিকে তৈরি করে ফেলে, তবে এটি জাস্ট সিগনেচার ভেরিফাই বা প্যাক করবে
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-signed.apk
          else
            $BUILD_TOOLS_DIR/apksigner sign --ks my-upload-key.jks \
              --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --out app/build/outputs/apk/release/app-release-signed.apk \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      # ৭. সফলভাবে সাইন হওয়া এপিকে-টি গিটহাব অ্যাকশনের 'Artifact' হিসেবে আপলোড করা
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
