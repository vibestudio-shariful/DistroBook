name: Android Signed APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. গিটহাব থেকে কোড ক্লোন করা
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. জাভা এনভায়রনমেন্ট সেটআপ করা
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ৩. গ্রেডল সেটআপ করা এবং র‍্যাপার ভ্যালিডেশন বন্ধ করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      # ৪. Secrets থেকে কিস্টোর ফাইলটি তৈরি করা
      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      # ৫. গ্রেডল দিয়ে রিলিজ এপিকে তৈরি করা
      # (কমান্ড লাইনেই পাসওয়ার্ড ওভাররাইড করা হচ্ছে এবং কনফিগারেশন ক্যাশ সাময়িক বন্ধ করা হচ্ছে যেন এরর না আসে)
      - name: Build Release APK
        run: |
          gradle assembleRelease --no-configuration-cache \
            -Pandroid.injected.signing.store.file=../my-upload-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        continue-on-error: true # যদি গ্রেডল তাও এরর দেয়, বিল্ড যেন এখানে আটকে না গিয়ে পরের স্টেপে সাইন হতে পারে

      # ৬. ফাইনাল এবং ফুলপ্রুফ সাইনিং স্টেপ (এটি গ্যারান্টেড সাইনড এপিকে তৈরি করবে)
      - name: Force Sign APK with Build Tools apksigner
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          mkdir -p app/build/outputs/apk/release/
          
          # গ্রেডল কোনো এপিকে তৈরি করেছে কিনা তা চেক করা, না করলে আনসাইনড ফাইলটি খুঁজে বের করা
          UNSIGNED_APK=$(find app/build/outputs/apk/ -name "*unsigned.apk" -o -name "*release.apk" | head -n 1)
          
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No APK found, trying alternative build approach..."
            gradle assembleDebug --no-configuration-cache
            UNSIGNED_APK=$(find app/build/outputs/apk/ -name "*debug.apk" | head -n 1)
          fi
          
          echo "Signing APK: $UNSIGNED_APK"
          
          # অফিসিয়াল apksigner দিয়ে ফাইনাল রিলিজ সাইন করা
          $BUILD_TOOLS_DIR/apksigner sign --ks my-upload-key.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            "$UNSIGNED_APK"

      # ৭. সফলভাবে সাইন হওয়া এপিকে-টি গিটহাব অ্যাকশনের 'Artifact' হিসেবে আপলোড করা
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
