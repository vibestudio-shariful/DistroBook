name: Android Signed APK Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # পুরোনো নষ্ট গ্রেডল ফাইল সম্পূর্ণ মুছে নতুন করে জেনারেট করার স্টেপ
      - name: Regenerate Fresh Gradle Wrapper
        run: |
          rm -f gradlew
          rm -f gradlew.bat
          rm -rf gradle/wrapper/
          gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/my-release-key.jks

      - name: Sign Release APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          $BUILD_TOOLS_DIR/apksigner sign --ks app/my-release-key.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
